# prompts/summary/prompts.toml

# =========================
# YATSEE Prompt Routing Rules
# =========================
# Map the prompt name to the summariy pass
[prompt_router]
city_council = {first = "city_council_first_pass", multi = "structure_preserving", final = "civic_scan"}
finance_committee = { first = "finance_committee_first_pass", multi = "structure_preserving", final = "finance_committee_final" }
committee_of_the_whole = { first = "committee_of_the_whole_first_pass", multi = "committee_meeting_structure_preserving", final = "committee_meeting_final" }
zoning_committee = { first = "zoning_committee_first_pass", multi = "structure_preserving", final = "committee_meeting_final" }
general = { first = "general_first_pass", multi = "structure_preserving", final = "final_pass_detailed" }

# =========================
# YATSEE Classifier Allowed Types
# =========================
[classifier_types]
allowed = [
    "city_council",
    "finance_committee",
    "committee_of_the_whole",
    "zoning_committee",
    "general"
]

# =========================
# YATSEE Classifiy meeting types
# =========================
[classifier_prompt]
text = """
You are a routing assistant. Classify this meeting to select the correct summary template.

Context: {context}

Transcript Snippet:
{text}

Based on context and structure of the snippet, classify as **one** of the following categories:
- city_council
- finance_committee
- committee_of_the_whole
- zoning_committee
- general

Analysis Rules:
1. **Finance Priority:** If Context mentions 'Finance', 'Budget', or 'Appropriation', classify as 'finance_committee' (even if it says 'Committee of the Whole').
2. **COW vs Council:** If Context says 'Committee of the Whole', classify as 'committee_of_the_whole'. Only classify as 'city_council' if the Context indicates a Regular/Special Council meeting.
3. **Zoning:** If Context mentions 'Zoning' or 'Planning', classify as 'zoning_committee'.

Return only the classification value as plain text. Do not include explanations or additional commentary.
"""

# =========================
# YATSEE Density chunk boundry keyword list
# =========================
[density_keywords]
keywords = [
    # Motions / voting
    "motion", "seconded", "vote", "aye", "nay", "abstain",
    "unanimous", "majority", "minority", "tie", "amend", "withdraw",

    # Procedural / formal
    "agenda", "committee", "adopt", "pass", "approve", "recommendation",
    "ordinance", "resolution", "hearing", "session", "council", "clerk",

    # Discussion / debate cues
    "discussion", "concern", "clarify", "question", "comment",
    "objection", "issue", "debate", "point", "consideration",

    # Finance / policy
    "budget", "funding", "grant", "expenditure", "allocation", "tax",
    "project", "proposal", "contract", "bid", "agreement", "procurement",

    # Reports / presentation
    "presentation", "report", "update", "summary", "review", "overview"
]



[prompts.city_council_first_pass]
text = """
You are a civic transcript extractor working on one segment of a city council meeting transcript.

Context: {context}

Transcript Segment:
{text}

This is only one segment of a larger meeting transcript.
Extract only what is explicitly supported by this segment.
Missing data is correct. Invented data is incorrect.

Core rules:
- Do not infer attendees from names mentioned in discussion.
- Only include attendance if roll call or explicit presence/absence is stated in this segment.
- Do not infer a motion from support, recommendation, presentation, or discussion.
- Do not infer a seconder unless explicitly stated.
- Do not infer a vote outcome from "aye" unless the outcome is explicitly stated.
- Do not use "unanimous" unless the transcript explicitly says unanimous.
- Do not claim no public comment, no motion, no vote, or no discussion unless explicitly stated.
- Do not add location, next meeting, or metadata not stated in the transcript.
- Do not convert discussion into formal council action.
- Keep summaries short, factual, and segment-local.
- Output only structured markdown using the exact format below.
- Omit empty fields and empty sections.

## Segment Facts
- Meeting: <name or unknown>
- Date: <YYYY-MM-DD or unknown>
- Attendance:
  - Present: <only if explicit>
  - Absent: <only if explicit>

## Topics
### Topic: <agenda item name, ordinance/resolution number, address, or short neutral factual label>
- Event Type: presentation | discussion | motion | vote | follow_up | public_comment | other
- Facts:
  - <short factual bullets>
- Quantitative Details:
  - <metric>: <value>
- Financial Details:
  - <description>: <amount>
- Motion:
  - Text: <exact or near-exact text if explicit>
  - Made By: <name if explicit>
  - Seconded By: <name if explicit>
- Vote:
  - Outcome: <passed|failed|deferred|unknown>
  - Method: <voice|roll_call|unanimous|unknown>
  - Tally: <only if explicit>
- Roll Call:
  - <name>: <aye|no|abstain|present|absent>
- Follow-up:
  - <only if explicit>

## Procedural Actions
- <call to order, roll call, agenda approval, minutes approval, suspension of rules, adjournment, etc. only if explicit in this segment>

## Public Comment
- Speaker: <name if explicit>
- Facts:
  - <specific concern, request, support, or opposition only if explicit>
"""



